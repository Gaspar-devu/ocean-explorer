name: Ocean Explorer CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Tests et Build 
  test-and-build:
    name: Tests & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # Back-end 
      - name: Installation des dépendances back-end
        run: npm install
        working-directory: ./backend

      - name: Exécution des tests Jest
        run: npm test
        working-directory: ./backend
        env:
          NODE_ENV: development

      # Front-end
      - name: Installation des dépendances front-end
        run: npm install
        working-directory: ./frontend

      - name: Build Vue.js
        run: npm run build
        working-directory: ./frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload de l'artifact front-end
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # Déploiement back-end
  deploy-backend:
    name: Déploiement Back-end
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Installation des dépendances de production
        run: npm install --omit=dev
        working-directory: ./backend

      - name: Connexion à Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Déploiement sur Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-ocean-explorer-back
          package: ./backend

  # Déploiement front-end
  deploy-frontend:
    name: Déploiement Front-end
    runs-on: ubuntu-latest
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Déploiement sur Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: "./frontend"
          api_location: ""
          output_location: "dist"